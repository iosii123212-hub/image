<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תמונות לכאן</title>
    <!-- פונט Rubik נקי ומודרני מ-Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* הגדרת משתני צבע למצב יום ולילה */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --border-color: #e9ecef;
            --shadow: rgba(0, 0, 0, 0.05);
            --toggle-bg: #e9ecef;
            --toggle-icon: #f39c12;
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --card-bg: #1e1e1e;
            --header-bg: #1e1e1e;
            --border-color: #2d2d2d;
            --shadow: rgba(0, 0, 0, 0.3);
            --toggle-bg: #2d2d2d;
            --toggle-icon: #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rubik', sans-serif;
            transition: var(--transition);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 50px;
        }

        /* סרגל עליון */
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* כפתור מצב יום/לילה */
        .theme-toggle {
            background: var(--toggle-bg);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--toggle-icon);
        }

        /* מיכל הגלריה */
        .container {
            max-width: 1250px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* גריד התמונות - 4 עמודות במסכים גדולים */
        .gallery {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 20px;
        }

        @media (min-width: 576px) {
            .gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 900px) {
            .gallery {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        /* עיצוב כרטיס תמונה */
        .image-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px var(--shadow);
            cursor: pointer;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px var(--shadow);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* הודעות שגיאה וטעינה */
        .status-message {
            text-align: center;
            font-size: 1.1rem;
            margin-top: 50px;
            grid-column: 1 / -1;
            color: var(--text-color);
            opacity: 0.8;
        }

        /* חלונית צפייה מוגדלת (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>תמונות לכאן</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="שינוי מצב תצוגה">🌙</button>
        </div>
    </header>

    <div class="container">
        <div class="gallery" id="galleryContainer">
            <p class="status-message" id="statusMessage">טוען תמונות...</p>
        </div>
    </div>

    <!-- לייטבוקס לתצוגה מוגדלת -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img class="lightbox-content" id="lightboxImg" src="" alt="תצוגה מוגדלת">
    </div>

    <script>
        // --- ניהול מצב יום/לילה ---
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        // --- זיהוי אוטומטי של מאגר ה-GitHub וטעינת התמונות ---
        const galleryContainer = document.getElementById('galleryContainer');
        const statusMessage = document.getElementById('statusMessage');

        // פונקציה לזיהוי המשתמש והמאגר מתוך ה-URL של GitHub Pages
        function getRepoDetails() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;

            // בדיקה אם האתר רץ ב-GitHub Pages (למשל username.github.io/reponame/)
            if (hostname.includes('github.io')) {
                const owner = hostname.split('.')[0];
                const repo = pathname.split('/').filter(Boolean)[0] || '';
                return { owner, repo };
            }
            
            // ערכי ברירת מחדל לבדיקה מקומית (יש לשנות לפרטים שלך אם אתה מריץ מקומית)
            return {
                owner: 'YOUR_GITHUB_USERNAME',
                repo: 'YOUR_REPO_NAME'
            };
        }

        // סיומות קבצים שיוגדרו כתמונות
        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];

        async function fetchImages() {
            const { owner, repo } = getRepoDetails();

            if (owner === 'YOUR_GITHUB_USERNAME') {
                statusMessage.innerHTML = 'כדי להציג את התמונות, יש להעלות את הקובץ ל-GitHub Pages או לערוך את פרטי ה-Repository בקוד ה-JavaScript.';
                return;
            }

            // פנייה ל-API של GitHub לקבלת תכולת התיקייה הראשית במאגר
            const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error('שגיאה בגישה לשרתי GitHub');
                }
                const files = await response.json();

                // סינון הקבצים שאינם תמונות
                const images = files.filter(file => {
                    if (file.type !== 'file') return false;
                    const ext = file.name.split('.').pop().toLowerCase();
                    return imageExtensions.includes(ext);
                });

                if (images.length === 0) {
                    statusMessage.textContent = 'לא נמצאו תמונות בתיקייה זו.';
                    return;
                }

                // הסרת הודעת הטעינה
                statusMessage.remove();

                // רינדור התמונות לגלריה
                images.forEach(imgData => {
                    const card = document.createElement('div');
                    card.className = 'image-card';
                    card.onclick = () => openLightbox(imgData.download_url);

                    const img = document.createElement('img');
                    // שימוש בכתובת ה-raw של התמונה
                    img.src = imgData.download_url;
                    img.alt = imgData.name;
                    img.loading = 'lazy'; // טעינה עצלה לביצועים משופרים

                    card.appendChild(img);
                    galleryContainer.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                statusMessage.textContent = 'לא ניתן לטעון את התמונות. ודא שהמאגר ציבורי ושקיימות בו תמונות.';
            }
        }

        // --- ניהול הלייטבוקס ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function openLightbox(url) {
            lightboxImg.src = url;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            // איפוס המקור כדי למנוע הבהוב של התמונה הקודמת בפתיחה הבאה
            setTimeout(() => { lightboxImg.src = ''; }, 300);
        }

        // הפעלת הפונקציה הראשית לאחר טעינת הדף
        window.addEventListener('DOMContentLoaded', fetchImages);
    </script>
</body>
</html>
