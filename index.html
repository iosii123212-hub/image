<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תמונות לכאן</title>
    
    <link rel="icon" type="image/png" href="1.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --header-bg: rgba(15, 23, 42, 0.85);
            --border-color: rgba(51, 65, 85, 0.5);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
            --accent-color: #818cf8;
            --accent-hover: #6366f1;
            --toggle-bg: #1e293b;
            --input-bg: #1e293b;
            --cols: 5;
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-secondary: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
            --header-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(226, 232, 240, 0.8);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --toggle-bg: #f1f5f9;
            --input-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        header {
            background-color: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 25px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-container {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 8px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle {
            background: var(--toggle-bg);
            border: 1px solid var(--border-color);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: var(--shadow);
        }

        .controls-panel {
            max-width: 1800px;
            margin: 30px auto 0;
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-sort-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
        }

        .search-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 1rem;
            box-shadow: var(--shadow);
            outline: none;
        }

        .select-custom {
            padding: 14px 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            box-shadow: var(--shadow);
        }

        .filter-chips {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .chip {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .chip.active, .chip:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .chip-favorites {
            border-color: #ef4444;
            color: #ef4444;
        }

        .chip-favorites.active, .chip-favorites:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .layout-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: var(--toggle-bg);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .layout-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
        }

        .layout-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        .stats-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* גלריה */
        .gallery-container {
            max-width: 1800px;
            margin: 30px auto;
            padding: 0 25px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(var(--cols), minmax(0, 1fr));
            gap: 20px;
        }

        @media (max-width: 1400px) { :root { --cols: 4 !important; } }
        @media (max-width: 1024px) { :root { --cols: 3 !important; } }
        @media (max-width: 768px) { :root { --cols: 2 !important; } }
        @media (max-width: 480px) { :root { --cols: 1 !important; } }

        /* כרטיס תמונה */
        .image-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .image-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .image-card:hover .image-wrapper img {
            transform: scale(1.05);
        }

        .fav-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 10;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }

        .fav-btn.active {
            color: #ef4444;
            background: rgba(255, 255, 255, 0.9);
            border-color: white;
        }

        .card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .share-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .share-box {
            display: flex;
            background: var(--toggle-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px 8px;
            align-items: center;
        }

        .share-url {
            font-size: 0.7rem;
            font-family: monospace;
            direction: ltr;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-grow: 1;
            opacity: 0.8;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            padding: 2px 4px;
        }

        .download-action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }

        .load-more-section {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .load-more-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
        }

        /* לייטבוקס */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 85%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 12px;
        }

        .lightbox-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .lightbox-prev { left: 30px; }
        .lightbox-next { right: 30px; }
        .lightbox-close { top: 30px; right: 30px; }
        
        .lightbox-play {
            top: 30px;
            left: 30px;
            font-size: 1rem;
            width: auto;
            padding: 0 15px;
            border-radius: 20px;
        }

        /* מודאל פרסומת קופצת - מותאם פרופורציונלית לממדי התמונה */
        .ad-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            transition: opacity 0.4s ease;
        }

        .ad-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .ad-container {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            max-width: 90vw;
            width: max-content; /* כיווץ התיבה בדיוק לרוחב המקסימלי של התמונה */
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ad-image {
            max-width: 100%;
            max-height: 60vh; /* מניעת חריגה מגובה המסך */
            object-fit: contain; /* שמירה על יחס הממדים המקורי של התמונה */
            border-radius: 14px;
            cursor: pointer;
            display: block;
        }

        .ad-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            width: 100%;
        }

        .ad-close-btn {
            position: absolute;
            top: -15px;
            left: -15px;
            background-color: #ef4444;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
            z-index: 10;
        }

        /* התראות */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background-color: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2500;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-section">
                <img src="1.png" alt="לוגו" class="logo-img" onerror="this.style.display='none'">
                <h1>תמונות לכאן</h1>
            </div>
            <div class="header-actions">
                <div class="layout-controls">
                    <button class="layout-btn" onclick="setLayout(2)">2</button>
                    <button class="layout-btn" onclick="setLayout(3)">3</button>
                    <button class="layout-btn" onclick="setLayout(4)">4</button>
                    <button class="layout-btn active" id="btn-layout-5" onclick="setLayout(5)">5</button>
                    <button class="layout-btn" onclick="setLayout(6)">6</button>
                    <button class="layout-btn" onclick="setLayout(7)">7</button>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="שינוי מצב תצוגה">☀️</button>
            </div>
        </div>
    </header>

    <div class="controls-panel">
        <div class="search-sort-row">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="חיפוש קבצים חכם...">
            </div>
            <select id="sortSelect" class="select-custom">
                <option value="name-asc">שם (א' - ת')</option>
                <option value="name-desc">שם (ת' - א')</option>
                <option value="random">אקראי 🎲</option>
            </select>
        </div>

        <div class="filter-chips" id="filterChips">
            <button class="chip active" onclick="setFilter('all')">הכל</button>
            <button class="chip chip-favorites" onclick="setFilter('favorites')">❤️ מועדפים</button>
        </div>

        <div class="stats-text" id="statsText">טוען קבצים...</div>
    </div>

    <div class="gallery-container">
        <div class="gallery" id="galleryContainer"></div>
        <div class="load-more-section" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" id="loadMoreBtn">טען תמונות נוספות</button>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close lightbox-btn" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-play lightbox-btn" id="slideshowBtn" onclick="toggleSlideshow(); event.stopPropagation();">▶ מצגת</button>
        <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1); event.stopPropagation();">&#10094;</button>
        <img class="lightbox-content" id="lightboxImg" src="" alt="תצוגה מוגדלת" onclick="event.stopPropagation();">
        <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1); event.stopPropagation();">&#10095;</button>
    </div>

    <!-- מודאל פרסומת קופצת מקושרת -->
    <div class="ad-modal" id="adModal" onclick="closeAd(event)">
        <div class="ad-container" onclick="event.stopPropagation();">
            <button class="ad-close-btn" onclick="closeAd(event)">&times;</button>
            <div class="ad-title">מבצע חם באתר! 📢</div>
            
            <a href="#" id="adLink" target="_blank" rel="noopener noreferrer">
                <img src="" alt="פרסומת" class="ad-image" id="adImage">
            </a>
            
            <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 15px;">לחץ על התמונה למעבר לאתר המפרסם או על ה-X לסגירה</p>
        </div>
    </div>

    <div class="toast" id="toast">הקישור הועתק בהצלחה!</div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'dark';

        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        function setLayout(cols) {
            document.documentElement.style.setProperty('--cols', cols);
            document.querySelectorAll('.layout-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'tiff', 'ico', 'heic', 'heif', 'avif'];
        let rawFiles = [];
        let filteredFiles = [];
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let currentLoadedIndex = 0;
        const limitPerPage = 100;
        let activeFilter = 'all';
        let activeSort = 'name-asc';
        
        let lightboxIndex = 0;
        let slideshowInterval = null;
        let isPlaying = false;

        const galleryContainer = document.getElementById('galleryContainer');
        const statsText = document.getElementById('statsText');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const filterChips = document.getElementById('filterChips');
        const loadMoreSection = document.getElementById('loadMoreSection');
        const loadMoreBtn = document.getElementById('loadMoreBtn');

        function getRepoDetails() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;

            if (hostname.includes('github.io')) {
                const owner = hostname.split('.')[0];
                const repo = pathname.split('/').filter(Boolean)[0] || '';
                return { owner, repo };
            }
            return { owner: 'YOUR_GITHUB_USERNAME', repo: 'YOUR_REPO_NAME' };
        }

        async function initGallery() {
            const { owner, repo } = getRepoDetails();
            if (owner === 'YOUR_GITHUB_USERNAME') {
                statsText.textContent = 'נא להעלות את הפרויקט ל-GitHub Pages להצגת תמונות.';
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/`);
                if (!response.ok) throw new Error();
                const files = await response.json();

                rawFiles = files.filter(f => {
                    if (f.type !== 'file') return false;
                    const ext = f.name.split('.').pop().toLowerCase();
                    return imageExtensions.includes(ext);
                });

                buildFilters();
                applyFilterAndSort();
                loadAdvertisements();

            } catch (e) {
                statsText.textContent = 'שגיאה בטעינת קבצים. ודא שהמאגר ציבורי.';
            }
        }

        async function loadAdvertisements() {
            try {
                const res = await fetch('1.json');
                if (!res.ok) return;
                const adList = await res.json();

                if (Array.isArray(adList) && adList.length > 0) {
                    const now = Date.now();
                    const lastAdShown = localStorage.getItem('lastAdShownTime');
                    const adCooldown = 5 * 60 * 1000; // הגבלת הופעה לפעם ב-5 דקות (במילישניות)

                    if (!lastAdShown || (now - lastAdShown > adCooldown)) {
                        const selectedAd = adList[Math.floor(Math.random() * adList.length)];
                        const adFileObj = rawFiles.find(f => f.name.toLowerCase() === selectedAd.image.toLowerCase());
                        
                        if (adFileObj) {
                            setTimeout(() => {
                                showAd(adFileObj.download_url, selectedAd.link);
                                localStorage.setItem('lastAdShownTime', now);
                            }, 2500);
                        }
                    }
                }
            } catch (e) {
                console.log('פרסומת לא הופעלה (תקופת המתנה פעילה או שגיאת קריאת קובץ הגדרות).');
            }
        }

        function showAd(imageUrl, targetLink) {
            const adModal = document.getElementById('adModal');
            const adImage = document.getElementById('adImage');
            const adLink = document.getElementById('adLink');
            
            adImage.src = imageUrl;
            adLink.href = targetLink;
            adModal.classList.add('active');
        }

        function closeAd(event) {
            if (event) event.stopPropagation();
            document.getElementById('adModal').classList.remove('active');
        }

        function buildFilters() {
            const formats = new Set();
            rawFiles.forEach(f => formats.add(f.name.split('.').pop().toLowerCase()));
            
            formats.forEach(format => {
                const chip = document.createElement('button');
                chip.className = 'chip';
                chip.textContent = format.toUpperCase();
                chip.onclick = () => setFilter(format, chip);
                filterChips.appendChild(chip);
            });
        }

        function setFilter(format, chipElement = null) {
            activeFilter = format;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            if (chipElement) {
                chipElement.classList.add('active');
            } else {
                document.querySelector('.chip').classList.add('active');
            }
            applyFilterAndSort();
        }

        function toggleFavorite(url) {
            if (favorites.includes(url)) {
                favorites = favorites.filter(fav => fav !== url);
            } else {
                favorites.push(url);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            applyFilterAndSort();
        }

        function applyFilterAndSort() {
            let result = [...rawFiles];

            if (activeFilter === 'favorites') {
                result = result.filter(f => favorites.includes(f.download_url));
            } else if (activeFilter !== 'all') {
                result = result.filter(f => f.name.split('.').pop().toLowerCase() === activeFilter);
            }

            const searchVal = searchInput.value.toLowerCase().trim();
            if (searchVal !== '') {
                result = result.filter(f => f.name.toLowerCase().includes(searchVal));
            }

            if (activeSort === 'name-asc') {
                result.sort((a, b) => a.name.localeCompare(b.name));
            } else if (activeSort === 'name-desc') {
                result.sort((a, b) => b.name.localeCompare(a.name));
            } else if (activeSort === 'random') {
                result.sort(() => Math.random() - 0.5);
            }

            filteredFiles = result;
            renderImages(true);
        }

        function renderImages(reset = false) {
            if (reset) {
                galleryContainer.innerHTML = '';
                currentLoadedIndex = 0;
            }

            const limit = currentLoadedIndex + limitPerPage;
            const itemsToRender = filteredFiles.slice(currentLoadedIndex, limit);

            itemsToRender.forEach((file, index) => {
                const globalIndex = currentLoadedIndex + index;
                const card = createCard(file, globalIndex);
                galleryContainer.appendChild(card);
            });

            currentLoadedIndex = limit;

            statsText.textContent = `מציג ${Math.min(currentLoadedIndex, filteredFiles.length)} מתוך ${filteredFiles.length} קבצים שנמצאו (סה"כ במאגר: ${rawFiles.length})`;

            if (currentLoadedIndex < filteredFiles.length) {
                loadMoreSection.style.display = 'flex';
            } else {
                loadMoreSection.style.display = 'none';
            }
        }

        function createCard(file, index) {
            const card = document.createElement('div');
            card.className = 'image-card';

            const isFav = favorites.includes(file.download_url);
            const favBtn = document.createElement('button');
            favBtn.className = `fav-btn ${isFav ? 'active' : ''}`;
            favBtn.innerHTML = '♥';
            favBtn.onclick = (e) => {
                e.stopPropagation();
                toggleFavorite(file.download_url);
            };
            card.appendChild(favBtn);

            const wrapper = document.createElement('div');
            wrapper.className = 'image-wrapper';
            wrapper.onclick = () => openLightbox(index);

            const img = document.createElement('img');
            img.src = file.download_url;
            img.alt = file.name;
            img.loading = 'lazy';
            wrapper.appendChild(img);

            const body = document.createElement('div');
            body.className = 'card-body';

            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = file.name;
            body.appendChild(title);

            const shareRow = document.createElement('div');
            shareRow.className = 'share-row';

            const shareBox = createShareBox(file.download_url, 'קישור');
            shareRow.appendChild(shareBox);

            const markdownUrl = `![${file.name}](${file.download_url})`;
            const markdownBox = createShareBox(markdownUrl, 'MD');
            shareRow.appendChild(markdownBox);

            body.appendChild(shareRow);

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-action-btn';
            downloadBtn.innerHTML = 'הורדה ישירה ⬇';
            downloadBtn.onclick = () => triggerDownload(file.download_url, file.name);
            body.appendChild(downloadBtn);

            card.appendChild(wrapper);
            card.appendChild(body);

            return card;
        }

        function createShareBox(text, label) {
            const shareBox = document.createElement('div');
            shareBox.className = 'share-box';

            const urlSpan = document.createElement('span');
            urlSpan.className = 'share-url';
            urlSpan.textContent = text;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = label;
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(text);
                showToast();
            };

            shareBox.appendChild(urlSpan);
            shareBox.appendChild(copyBtn);
            return shareBox;
        }

        async function triggerDownload(url, filename) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        searchInput.addEventListener('input', applyFilterAndSort);
        sortSelect.addEventListener('change', (e) => {
            activeSort = e.target.value;
            applyFilterAndSort();
        });

        loadMoreBtn.addEventListener('click', () => renderImages(false));

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const slideshowBtn = document.getElementById('slideshowBtn');

        function openLightbox(index) {
            lightboxIndex = index;
            updateLightboxImage();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            stopSlideshow();
            setTimeout(() => { lightboxImg.src = ''; }, 200);
        }

        function navigateLightbox(direction) {
            lightboxIndex += direction;
            if (lightboxIndex >= filteredFiles.length) lightboxIndex = 0;
            if (lightboxIndex < 0) lightboxIndex = filteredFiles.length - 1;
            updateLightboxImage();
        }

        function updateLightboxImage() {
            if (filteredFiles[lightboxIndex]) {
                lightboxImg.src = filteredFiles[lightboxIndex].download_url;
            }
        }

        function toggleSlideshow() {
            if (isPlaying) {
                stopSlideshow();
            } else {
                startSlideshow();
            }
        }

        function startSlideshow() {
            isPlaying = true;
            slideshowBtn.textContent = '⏸ עצור';
            slideshowInterval = setInterval(() => {
                navigateLightbox(1);
            }, 3000);
        }

        function stopSlideshow() {
            isPlaying = false;
            slideshowBtn.textContent = '▶ מצגת';
            clearInterval(slideshowInterval);
        }

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
            if (e.key === 'Escape') closeLightbox();
        });

        lightbox.addEventListener('click', closeLightbox);

        window.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
